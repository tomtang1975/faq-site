<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'unsafe-inline' 'self'; style-src 'unsafe-inline' 'self'; img-src 'self' data:; object-src 'none'; base-uri 'none'; frame-ancestors 'none'">
<title>常見問題 FAQ - 一卡通 iPASS</title>
<style>
  /* ── Root Variables (iPASS Green Theme) ── */
  :root {
    --bg: #f0f7f0;
    --card: #ffffff;
    --card-hover: #eaf5ea;
    --text: #1a2a1a;
    --text-secondary: #5a7a5a;
    --accent: #10A83B;
    --accent-hover: #0D8C32;
    --accent-dim: #00C43F;
    --accent-glow: rgba(16,168,59,0.08);
    --border: #d0e0d0;
    --tag-bg: rgba(16,168,59,0.06);
    --tag-text: #10A83B;
    --highlight-bg: rgba(248,193,2,0.25);
    --highlight-text: #F8C102;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 4px 24px rgba(0,0,0,0.08);
    --transition: all 0.25s ease;
  }
  [data-theme="dark"] {
    --bg: #0a0a0f;
    --card: #16161f;
    --card-hover: #1e1e2a;
    --text: #e8e8f0;
    --text-secondary: #9898b0;
    --accent: #10A83B;
    --accent-hover: #0D8C32;
    --accent-dim: #00C43F;
    --accent-glow: rgba(16,168,59,0.15);
    --border: #2a2a3a;
    --tag-bg: rgba(16,168,59,0.1);
    --tag-text: #10A83B;
    --highlight-bg: rgba(248,193,2,0.25);
    --highlight-text: #F8C102;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    transition: var(--transition);
    min-height: 100vh;
  }
  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex; align-items: center; justify-content: space-between;
    backdrop-filter: blur(12px);
    transition: var(--transition);
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-left a {
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 14px;
    display: flex; align-items: center; gap: 6px;
    transition: var(--transition);
  }
  .header-left a:hover { color: var(--accent); }
  .header h1 {
    font-size: 18px; font-weight: 700;
    background: linear-gradient(135deg, var(--accent), var(--accent-dim));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .theme-toggle {
    background: none; border: 1px solid var(--border);
    color: var(--text); width: 36px; height: 36px;
    border-radius: 50%; cursor: pointer;
    font-size: 16px; transition: var(--transition);
    display: flex; align-items: center; justify-content: center;
  }
  .theme-toggle:hover {
    background: var(--accent-glow); border-color: var(--accent);
  }
  /* ── Stats Bar ── */
  .stats-bar {
    display: none;
    padding: 16px 24px 0;
    max-width: 1100px; margin: 0 auto;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-size: 13px;
    color: var(--text-secondary);
    transition: var(--transition);
  }
  .stat strong { color: var(--accent); font-weight: 600; }
  /* ── Main Container ── */
  .container { max-width: 1100px; margin: 0 auto; padding: 20px 24px 60px; }
  /* ── Search ── */
  .search-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .search-wrap svg {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 18px; height: 18px;
    color: var(--text-secondary);
  }
  .search-input {
    width: 100%; padding: 12px 16px 12px 44px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-size: 15px;
    transition: var(--transition);
    outline: none;
  }
  .search-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .search-input::placeholder { color: var(--text-secondary); }
  .search-clear {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-secondary);
    cursor: pointer; font-size: 18px; padding: 4px 8px;
    display: none; border-radius: 4px;
    transition: var(--transition);
  }
  .search-clear:hover { color: var(--text); background: var(--accent-glow); }
  .search-clear.visible { display: block; }
  .search-count {
    font-size: 13px; color: var(--text-secondary);
    margin-top: 8px;
  }
  /* ── Category Tabs ── */
  .categories {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-bottom: 16px;
  }
  .cat-tab {
    padding: 8px 18px;
    border: 1px solid var(--border);
    border-radius: 20px;
    background: var(--card);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 14px;
    transition: var(--transition);
    white-space: nowrap;
  }
  .cat-tab:hover {
    border-color: var(--accent);
    color: var(--text);
  }
  .cat-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .cat-tab .count {
    display: inline-block;
    font-size: 11px;
    background: var(--tag-bg);
    color: var(--tag-text);
    padding: 1px 7px;
    border-radius: 10px;
    margin-left: 4px;
  }
  .cat-tab.active .count {
    background: rgba(255,255,255,0.2);
    color: #fff;
  }
  /* ── Subcategory Chips ── */
  .subcats {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 20px;
    min-height: 0;
    transition: all 0.2s;
  }
  .subcat-chip {
    padding: 4px 12px;
    border: 1px solid var(--border);
    border-radius: 14px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 12px;
    transition: var(--transition);
  }
  .subcat-chip:hover { border-color: var(--accent); color: var(--text); }
  .subcat-chip.active {
    background: var(--tag-bg);
    border-color: var(--accent);
    color: var(--accent);
    font-weight: 500;
  }
  /* ── FAQ Accordion ── */
  .faq-list { display: flex; flex-direction: column; gap: 8px; }
  .faq-item {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: var(--transition);
  }
  .faq-item:hover { border-color: rgba(16,168,59,0.3); }
  .faq-item.open { border-color: var(--accent); }
  .faq-question {
    padding: 16px 20px;
    cursor: pointer;
    display: flex; align-items: flex-start; gap: 12px;
    font-size: 15px; font-weight: 500;
    user-select: none;
    transition: var(--transition);
  }
  .faq-question:hover { background: var(--card-hover); }
  .faq-question .icon {
    flex-shrink: 0;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--tag-bg);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    transition: var(--transition);
    margin-top: 2px;
  }
  .faq-item.open .faq-question .icon {
    background: var(--accent);
    color: #fff;
    transform: rotate(180deg);
  }
  .faq-question .q-text { flex: 1; }
  .faq-question .meta {
    flex-shrink: 0;
    font-size: 11px;
    color: var(--text-secondary);
    background: var(--tag-bg);
    padding: 2px 8px;
    border-radius: 8px;
    margin-top: 2px;
  }
  .faq-answer {
    max-height: 0; overflow: hidden;
    transition: max-height 0.35s ease, padding 0.25s ease;
    padding: 0 20px;
  }
  .faq-item.open .faq-answer {
    max-height: 5000px;
    padding: 0 20px 20px;
  }
  .faq-answer-inner {
    border-top: 1px solid var(--border);
    padding-top: 16px;
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
  }
  .faq-answer-inner p { margin-bottom: 10px; }
  .faq-answer-inner ul, .faq-answer-inner ol { margin: 8px 0 8px 20px; }
  .faq-answer-inner li { margin-bottom: 4px; }
  .faq-answer-inner a { color: var(--accent); }
  .faq-answer-inner strong { font-weight: 600; }
  .faq-answer-inner small { font-size: 12px; color: var(--text-secondary); }
  .faq-answer-inner table {
    width: 100%; border-collapse: collapse;
    margin: 10px 0; font-size: 13px;
  }
  .faq-answer-inner th, .faq-answer-inner td {
    border: 1px solid var(--border);
    padding: 8px 10px; text-align: left;
  }
  .faq-answer-inner th {
    background: var(--accent-glow);
    font-weight: 600;
  }
  .faq-answer-inner hr {
    border: none; border-top: 1px solid var(--border);
    margin: 12px 0;
  }
  .faq-answer-inner img {
    max-width: 100%; height: auto;
    border-radius: var(--radius-sm);
    margin: 8px 0;
  }
  /* ── No Results ── */
  .no-results {
    text-align: center; padding: 60px 20px;
    color: var(--text-secondary);
  }
  .no-results .emoji { font-size: 48px; margin-bottom: 12px; }
  .no-results p { font-size: 15px; }
  /* ── Highlight Search Matches (iPASS Yellow) ── */
  .highlight {
    background: var(--highlight-bg);
    color: var(--highlight-text);
    padding: 1px 3px;
    border-radius: 3px;
    font-weight: 500;
  }
  /* ── Loading ── */
  .loading {
    text-align: center; padding: 80px 20px;
    color: var(--text-secondary);
  }
  .loading .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* ── Responsive ── */
  @media (max-width: 640px) {
    .header { padding: 10px 16px; }
    .header h1 { font-size: 16px; }
    .container { padding: 12px 16px 40px; }
    .faq-question { padding: 14px 16px; font-size: 14px; }
    .faq-item.open .faq-answer { padding: 0 16px 16px; }
    .categories { gap: 6px; }
    .cat-tab { padding: 6px 14px; font-size: 13px; }
    .stats-bar { padding: 12px 16px 0; }
    .stat { font-size: 12px; padding: 6px 10px; }
  }
</style>
</head>
<body>

  <!-- Header -->
  <header class="header">
  <div class="header-left">
      <a href="https://www.i-pass.com.tw/" target="_blank">← iPASS 官網</a>
      <h1>常見問題 FAQ</h1>
    </div>
    <button class="theme-toggle" onclick="toggleTheme()" title="切換主題" id="themeBtn">☀️</button>
  </header>

  <!-- Stats -->
  <div class="stats-bar" id="statsBar"></div>

  <div class="container">

    <!-- Search -->
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
      </svg>
      <input class="search-input" id="searchInput" type="text" placeholder="搜尋常見問題…（輸入關鍵字即時搜尋問題與答案）" autocomplete="off">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
    <div class="search-count" id="searchCount"></div>

    <!-- Category Tabs -->
    <div class="categories" id="catTabs"></div>

    <!-- Subcategory Chips -->
    <div class="subcats" id="subCats"></div>

    <!-- FAQ List -->
    <div class="faq-list" id="faqList"></div>

  </div>

  <script>
  // ══════════════════════════════════════════════
  // FAQ Data
  // ══════════════════════════════════════════════
  const FAQ_DATA = null; // fetched from JSON
  let faqs = [];
  let categories = [];
  let allFaqs = [];
  let activeCat = 'iPASS MONEY';
  let activeSubcat = '';
  let searchQuery = '';
  let debounceTimer = null;

  // ══════════════════════════════════════════════
  // Theme
  // ══════════════════════════════════════════════
  function getTheme() {
    return localStorage.getItem('faq-theme') || 'light';
  }
  function setTheme(t) {
    document.documentElement.setAttribute('data-theme', t);
    localStorage.setItem('faq-theme', t);
    document.getElementById('themeBtn').textContent = t === 'dark' ? '🌙' : '☀️';
  }
  function toggleTheme() {
    setTheme(getTheme() === 'dark' ? 'light' : 'dark');
  }
  setTheme(getTheme());

  // ══════════════════════════════════════════════
  // Load & Render
  // ══════════════════════════════════════════════
  async function loadData() {
    try {
      const res = await fetch('ipass_faq_complete.json');
      const data = await res.json();
      allFaqs = data.faqs;
      categories = data.categories || [];
      renderAll();
    } catch(e) {
      document.getElementById('faqList').innerHTML =
        '<div class="no-results"><div class="emoji">⚠️</div><p>無法載入 FAQ 資料：' + e.message + '</p></div>';
    }
  }

  function getFiltered() {
    let list = allFaqs;

    // Category filter
    if (activeCat !== 'all') {
      list = list.filter(f => f.category_name === activeCat);
    }

    // Subcategory filter
    if (activeSubcat) {
      list = list.filter(f => f.subcategory_name === activeSubcat);
    }

    // Search
    if (searchQuery.trim()) {
      const q = searchQuery.trim().toLowerCase();
      list = list.filter(f => {
        return f.question.toLowerCase().includes(q)
            || stripHtml(f.answer).toLowerCase().includes(q);
      });
    }

    return list;
  }

  function stripHtml(html) {
    const d = document.createElement('div');
    d.innerHTML = html;
    return d.textContent || d.innerText || '';
  }

  function highlightText(text, query) {
    if (!query.trim()) return text;
    const q = query.trim();
    // Escape regex special chars
    const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('(' + escaped + ')', 'gi');
    return text.replace(re, '<span class="highlight">$1</span>');
  }

  function renderAll() {
    renderStats();
    renderCategories();
    renderSubcategories();
    renderList();
  }

  function renderStats() {
    const bar = document.getElementById('statsBar');
    bar.innerHTML = `
      <span class="stat">📚 總題數 <strong>${allFaqs.length}</strong></span>
      <span class="stat">📂 分類 <strong>${categories.length}</strong></span>
    `;
  }

  function getCategoryCount(name) {
    if (name === 'all') return allFaqs.length;
    const cat = categories.find(c => (c.name || Object.keys(c)[0]) === name);
    return cat ? (cat.count || cat[name] || 0) : allFaqs.filter(f => f.category_name === name).length;
  }

  function renderCategories() {
    const container = document.getElementById('catTabs');
    let html = `<button class="cat-tab ${activeCat === 'all' ? 'active' : ''}" onclick="selectCategory('all')">
      全部 <span class="count">${getCategoryCount('all')}</span>
    </button>`;
    categories.forEach(c => {
      const name = c.name || Object.keys(c)[0];
      const count = c.count || c[name] || 0;
      html += `<button class="cat-tab ${activeCat === name ? 'active' : ''}" onclick="selectCategory('${escapeHtml(name)}')">
        ${escapeHtml(name)} <span class="count">${count}</span>
      </button>`;
    });
    container.innerHTML = html;
  }

  function getSubcategories() {
    const subs = {};
    let source = allFaqs;
    if (activeCat !== 'all') {
      source = allFaqs.filter(f => f.category_name === activeCat);
    }
    source.forEach(f => {
      const s = f.subcategory_name || '其他';
      subs[s] = (subs[s] || 0) + 1;
    });
    return Object.entries(subs).sort((a,b) => b[1] - a[1]);
  }

  function renderSubcategories() {
    const container = document.getElementById('subCats');
    const subs = getSubcategories();
    let html = '';
    if (subs.length > 1) {
      html += `<button class="subcat-chip ${!activeSubcat ? 'active' : ''}" onclick="selectSubcategory('')">全部</button>`;
    }
    subs.forEach(([name, count]) => {
      html += `<button class="subcat-chip ${activeSubcat === name ? 'active' : ''}" onclick="selectSubcategory('${escapeHtml(name)}')">
        ${escapeHtml(name)} (${count})
      </button>`;
    });
    container.innerHTML = html;
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/'/g,'&#39;').replace(/"/g,'&quot;');
  }

  function renderList() {
    const container = document.getElementById('faqList');
    const results = getFiltered();
    const countEl = document.getElementById('searchCount');

    // Update count
    const total = allFaqs.length;
    let countText = `顯示 ${results.length} / ${total} 題`;
    if (searchQuery.trim()) {
      countText = `🔍 搜尋「${escapeHtml(searchQuery.trim())}」共 ${results.length} 筆結果`;
    } else if (activeCat !== 'all') {
      const totalCat = getCategoryCount(activeCat);
      if (activeSubcat) {
        countText += `（${escapeHtml(activeCat)} › ${escapeHtml(activeSubcat)}）`;
      } else {
        countText += `（${escapeHtml(activeCat)}）`;
      }
    }
    countEl.textContent = countText;

    if (results.length === 0) {
      container.innerHTML = `
        <div class="no-results">
          <div class="emoji">🔍</div>
          <p>沒有符合條件的常見問題</p>
          <p style="font-size:13px;margin-top:8px">試試其他關鍵字或清除篩選條件</p>
        </div>`;
      return;
    }

    let html = '';
    const q = searchQuery.trim();
    results.forEach((faq, idx) => {
      const qDisplay = q ? highlightText(escapeHtml(faq.question), q) : escapeHtml(faq.question);
      html += `<div class="faq-item" data-idx="${idx}">
        <div class="faq-question" onclick="toggleFAQ(this)">
          <span class="icon">▼</span>
          <span class="q-text">${qDisplay}</span>
          <span class="meta">${escapeHtml(faq.subcategory_name || '')}</span>
        </div>
        <div class="faq-answer">
          <div class="faq-answer-inner">${sanitizeAnswer(faq.answer, q)}</div>
        </div>
      </div>`;
    });
    container.innerHTML = html;
  }

  function sanitizeAnswer(html, query) {
    // Allow safe tags, remove scripts/iframes
    let sanitized = html
      .replace(/<script[\s\S]*?<\/script>/gi, '')
      .replace(/<iframe[\s\S]*?<\/iframe>/gi, '')
      .replace(/on\w+="[^"]*"/gi, '')  // remove event handlers
      .replace(/on\w+='[^']*'/gi, '')
      .replace(/javascript:/gi, '');
    // Highlight in answer too
    if (query && query.trim()) {
      sanitized = highlightInHtml(sanitized, query.trim());
    }
    return sanitized;
  }

  function highlightInHtml(html, query) {
    // Only highlight text nodes, not inside tags
    const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp('(' + escaped + ')', 'gi');
    // Simple approach: split by tags, highlight text portions
    return html.replace(/([^<]*)(<[^>]*>)?/g, (match, text, tag) => {
      if (text) {
        return text.replace(re, '<span class="highlight">$1</span>') + (tag || '');
      }
      return tag || '';
    });
  }

  // ══════════════════════════════════════════════
  // Interactions
  // ══════════════════════════════════════════════
  function selectCategory(name) {
    activeCat = name;
    activeSubcat = '';
    searchQuery = document.getElementById('searchInput').value;
    renderAll();
  }

  function selectSubcategory(name) {
    activeSubcat = name;
    searchQuery = document.getElementById('searchInput').value;
    renderList();
    renderCategories();
  }

  function toggleFAQ(el) {
    const item = el.parentElement;
    item.classList.toggle('open');
    // Scroll to reveal answer if just opened (only when partially hidden)
    if (item.classList.contains('open')) {
      setTimeout(() => {
        const rect = item.getBoundingClientRect();
        const headerH = 64;
        if (rect.top < headerH) {
          window.scrollBy({ top: rect.top - headerH - 8, behavior: 'smooth' });
        }
      }, 60);
    }
  }

  function clearSearch() {
    document.getElementById('searchInput').value = '';
    searchQuery = '';
    document.getElementById('searchClear').classList.remove('visible');
    renderList();
    document.getElementById('searchInput').focus();
  }

  // ══════════════════════════════════════════════
  // Search with debounce
  // ══════════════════════════════════════════════
  document.getElementById('searchInput').addEventListener('input', function() {
    clearTimeout(debounceTimer);
    searchQuery = this.value;
    document.getElementById('searchClear').classList.toggle('visible', this.value.length > 0);
    debounceTimer = setTimeout(() => {
      // Reset subcat when searching
      if (searchQuery.trim()) {
        activeSubcat = '';
      }
      renderList();
      renderCategories();
      renderSubcategories();
    }, 150);
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', function(e) {
    // Ctrl+F or Ctrl+K to focus search
    if ((e.ctrlKey || e.metaKey) && (e.key === 'f' || e.key === 'k')) {
      e.preventDefault();
      document.getElementById('searchInput').focus();
    }
    // Escape to clear search and close open FAQ
    if (e.key === 'Escape') {
      const input = document.getElementById('searchInput');
      if (input.value) {
        clearSearch();
      } else {
        document.querySelectorAll('.faq-item.open').forEach(i => i.classList.remove('open'));
      }
      input.blur();
    }
  });
